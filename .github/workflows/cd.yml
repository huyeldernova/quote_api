name: CD
run-name: ${{ github.actor }} is cd out GitHub Actions 🚀

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - master

jobs:
  cd-pipeline:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./quotesend-api
          file: ./quotesend-api/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/quotesend-api:${{ github.event.workflow_run.head_sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/quotesend-api:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Start deploying EC2 ..."
            cd ~/quote_api/quotesend-api
            sudo docker compose pull app
            sudo docker compose up -d app
            sudo docker image prune -f
            echo "Deploying EC2 completed."