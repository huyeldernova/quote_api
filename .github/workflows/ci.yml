name: CI
run-name: ${{ github.actor }} is ci out GitHub Actions 🚀

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Build Maven
        working-directory: quotesend-api
        run: mvn clean package -DskipTests